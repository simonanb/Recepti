<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моја Книга со Рецепти</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #FFF8F0;
      --card-bg:      #FFFDF9;
      --brown:        #3D2B1F;
      --brown-mid:    #6B4C3B;
      --brown-light:  #9A7460;
      --terra:        #C1603A;
      --terra-hover:  #A84E2C;
      --border:       #E8D5C4;
      --shadow:       rgba(61, 43, 31, 0.10);
      --shadow-deep:  rgba(61, 43, 31, 0.22);
      --serif:        'Playfair Display', Georgia, serif;
      --sans:         'Lato', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--brown);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* â”€â”€ HEADER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    header {
      background: var(--brown);
      color: var(--cream);
      text-align: center;
      padding: 3rem 1.5rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(193,96,58,.25) 0%, transparent 65%);
      pointer-events: none;
    }

    .header-ornament {
      display: block;
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 0.6rem;
      opacity: 0.9;
    }

    header h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .header-divider::before,
    .header-divider::after {
      content: '';
      display: block;
      width: 3rem;
      height: 1px;
      background: var(--terra);
      opacity: 0.6;
    }

    .header-divider span {
      color: var(--terra);
      font-size: 1rem;
    }

    header p {
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* â”€â”€ CONTROLS (sticky) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .controls {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px var(--shadow);
    }

    .controls-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    @media (min-width: 640px) {
      .controls-inner {
        flex-direction: row;
        align-items: center;
        gap: 1.25rem;
      }
    }

    /* Search */
    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    @media (min-width: 640px) {
      .search-wrap { width: 260px; }
    }

    .search-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--brown-light);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 0.625rem 1rem 0.625rem 2.5rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--brown);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: var(--terra);
      box-shadow: 0 0 0 3px rgba(193,96,58,.12);
    }

    #search::placeholder { color: var(--brown-light); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .tab-btn {
      padding: 0.45rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brown-mid);
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .tab-btn:hover {
      border-color: var(--terra);
      color: var(--terra);
    }

    .tab-btn.active {
      background: var(--terra);
      border-color: var(--terra);
      color: #fff;
    }

    /* â”€â”€ MAIN â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    .results-meta {
      font-size: 0.82rem;
      color: var(--brown-light);
      font-style: italic;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    /* â”€â”€ GRID â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* â”€â”€ CARD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s;
      box-shadow: 0 2px 10px var(--shadow);
      animation: cardIn 0.35s ease both;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px var(--shadow-deep);
      border-color: #D4B89A;
    }

    .card:focus-visible {
      outline: 2px solid var(--terra);
      outline-offset: 3px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .card-badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.875rem;
    }

    .badge {
      display: inline-block;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Category badge colours */
    .badge-cat-breakfast { background: #FFF0C2; color: #7A5500; }
    .badge-cat-lunch     { background: #D6F0DC; color: #1B5E30; }
    .badge-cat-dinner    { background: #EAD8CB; color: #5C2A10; }
    .badge-cat-desserts  { background: #FAD9DC; color: #7B1D28; }

    /* Difficulty badge colours */
    .badge-diff-easy   { background: #D6F0DC; color: #1B5E30; }
    .badge-diff-medium { background: #FFF0C2; color: #7A5500; }
    .badge-diff-hard   { background: #FAD9DC; color: #7B1D28; }

    .card-title {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.855rem;
      color: var(--brown-mid);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--brown-light);
    }

    /* â”€â”€ EMPTY STATE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty h3 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-style: italic;
      color: var(--brown-mid);
      margin-bottom: 0.4rem;
    }

    .empty p {
      font-size: 0.875rem;
      color: var(--brown-light);
    }

    /* â”€â”€ MODAL OVERLAY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 18, 10, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* â”€â”€ MODAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .modal {
      background: var(--card-bg);
      border-radius: 18px;
      max-width: 660px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.94) translateY(14px);
      transition: transform 0.28s cubic-bezier(0.34, 1.36, 0.64, 1);
      box-shadow: 0 28px 72px rgba(30,18,10,.35);
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal::-webkit-scrollbar        { width: 5px; }
    .modal::-webkit-scrollbar-track  { background: transparent; }
    .modal::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 99px; }

    /* Modal header â€” sticks while scrolling */
    .modal-head {
      padding: 2rem 2rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
      border-radius: 18px 18px 0 0;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .modal-close {
      position: absolute;
      top: 1.1rem;
      right: 1.1rem;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--brown-mid);
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .modal-close:hover  { background: var(--terra); border-color: var(--terra); color: #fff; }
    .modal-close:focus-visible { outline: 2px solid var(--terra); outline-offset: 2px; }

    .modal-title {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.875rem;
      padding-right: 2.5rem;
    }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .modal-time {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--brown-light);
      margin-left: 0.15rem;
    }

    /* Modal body */
    .modal-body {
      padding: 1.5rem 2rem 2.5rem;
    }

    .modal-desc {
      font-size: 0.95rem;
      color: var(--brown-mid);
      font-style: italic;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .section-head {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--terra);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Macro table */
    .macro-table {
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .macro-head-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .macro-val-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: #fff;
    }

    .macro-cell {
      padding: 0.55rem 0.6rem;
      font-size: 0.78rem;
      border-right: 1px solid var(--border);
    }

    .macro-cell:last-child { border-right: none; }

    .macro-head-row .macro-cell {
      color: var(--brown-mid);
      font-weight: 400;
    }

    .macro-val-row .macro-cell {
      font-weight: 700;
      color: var(--brown);
    }

    .macro-val-row .macro-cell:first-child { color: var(--terra); }

    @media (max-width: 540px) {
      .macro-head-row, .macro-val-row {
        grid-template-columns: repeat(3, 1fr);
      }
      .macro-head-row .macro-cell:nth-child(n+4),
      .macro-val-row  .macro-cell:nth-child(n+4) {
        border-top: 1px solid var(--border);
      }
      .macro-head-row .macro-cell:nth-child(3),
      .macro-val-row  .macro-cell:nth-child(3) { border-right: none; }
    }

    /* Ingredients */
    .ingredients {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 0;
      margin-bottom: 2rem;
    }

    .ingredients li {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      font-size: 0.88rem;
      line-height: 1.5;
      padding: 0.4rem 0.25rem;
      border-bottom: 1px dashed var(--border);
      color: var(--brown);
    }

    .ingredients li::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--terra);
      flex-shrink: 0;
      margin-top: 0.45em;
    }

    /* Instructions */
    .instructions {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .instructions li {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--brown);
    }

    .step-num {
      flex-shrink: 0;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      background: var(--terra);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.15em;
    }

    /* â”€â”€ FOOTER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.78rem;
      color: var(--brown-light);
      border-top: 1px solid var(--border);
      letter-spacing: 0.04em;
    }

    /* â”€â”€ RESPONSIVE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    @media (max-width: 480px) {
      main { padding: 1.5rem 1rem 4rem; }
      .modal-head, .modal-body { padding-left: 1.25rem; padding-right: 1.25rem; }
      .ingredients { grid-template-columns: 1fr; }
    }

    /* Card image */
    .card-img {
      width: calc(100% + 3rem);
      margin: -1.5rem -1.5rem 1.25rem;
      height: 190px;
      object-fit: cover;
      border-radius: 14px 14px 0 0;
      display: block;
    }

    .card-no-img {
      width: calc(100% + 3rem);
      margin: -1.5rem -1.5rem 1.25rem;
      height: 120px;
      background: linear-gradient(135deg, #F5E6D8 0%, #EDD8C4 100%);
      border-radius: 14px 14px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      opacity: 0.6;
    }

    /* Modal hero */
    .modal-hero {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• HEADER -->
<header>
  <span class="header-ornament">Лична колекција</span>
  <h1>Моја Книга со Рецепти</h1>
  <div class="header-divider"><span>✦</span></div>
  <p>Омилени јадења, секогаш при рака</p>
</header>

<!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• CONTROLS (sticky) -->
<nav class="controls" aria-label="Филтрирај рецепти">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Пребарај по назив или состојка…"
             aria-label="Пребарај рецепти" autocomplete="off" />
    </div>
    <div class="tabs" role="tablist" aria-label="Категории на рецепти">
      <button class="tab-btn active" data-cat="all"       role="tab" aria-selected="true">Сите</button>
      <button class="tab-btn"        data-cat="breakfast" role="tab" aria-selected="false">Појадок</button>
      <button class="tab-btn"        data-cat="lunch"     role="tab" aria-selected="false">Ручек</button>
      <button class="tab-btn"        data-cat="dinner"    role="tab" aria-selected="false">Вечера</button>
      <button class="tab-btn"        data-cat="desserts"  role="tab" aria-selected="false">Десерти</button>
    </div>
  </div>
</nav>

// ================================================================
// STATE
// ================================================================
let activeCat   = 'all';
let searchQuery = '';

// ================================================================
// HELPERS
// ================================================================
const catMK = { breakfast: 'Појадок', lunch: 'Ручек', dinner: 'Вечера', desserts: 'Десерти' };
function cap(cat) { return catMK[cat] || cat; }

function getFiltered() {
  const q = searchQuery.toLowerCase().trim();
  return recipes.filter(r => {
    const catOk = activeCat === 'all' || r.category === activeCat;
    if (!catOk) return false;
    if (!q)     return true;
    return (
      r.name.toLowerCase().includes(q) ||
      r.description.toLowerCase().includes(q) ||
      r.ingredients.some(i => i.toLowerCase().includes(q))
    );
  });
}

const clockSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
  aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;

const personSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
  aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

// ================================================================
// RENDER GRID
// ================================================================
function renderGrid() {
  const grid    = document.getElementById('grid');
  const metaEl  = document.getElementById('results-meta');
  const results = getFiltered();

  metaEl.textContent = results.length === recipes.length
    ? `${recipes.length} рецепти`
    : `${results.length} од ${recipes.length} рецепти`;

  if (results.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">ðŸ½ï¸</div>
        <h3>Ништо не е пронајдено</h3>
        <p>Обиди се со друг збор или промени категорија.</p>
      </div>`;
    return;
  }

  grid.innerHTML = results.map((r, i) => `
    <article class="card" role="listitem" tabindex="0" data-id="${r.id}"
             style="animation-delay:${i * 45}ms"
             aria-label="Отвори рецепт: ${r.name}">
      ${r.image
        ? `<img class="card-img" src="${r.image}" alt="${r.name}" loading="lazy">`
        : `<div class="card-no-img" aria-hidden="true">&#127859;</div>`}
      <div class="card-badges">
        <span class="badge badge-cat-${r.category}">${cap(r.category)}</span>
        <span class="badge badge-diff-${r.difficulty.toLowerCase()}">${r.difficulty}</span>
      </div>
      <h3 class="card-title">${r.name}</h3>
      <p class="card-desc">${r.description}</p>
      <div class="card-footer">
        ${clockSVG}
        ${r.prepTime || 'Н/П'}
      </div>
    </article>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    const open = () => openModal(Number(card.dataset.id));
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
    });
  });
}

// ================================================================
// MODAL
// ================================================================
function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('modal-title').textContent = r.name;

  document.getElementById('modal-meta').innerHTML = `
    <span class="badge badge-cat-${r.category}">${cap(r.category)}</span>
    <span class="badge badge-diff-${r.difficulty.toLowerCase()}">${r.difficulty}</span>
    <span class="modal-time">${clockSVG} ${r.prepTime}</span>
    ${r.servings ? `<span class="modal-time">${personSVG} ${r.servings}</span>` : ''}
  `;

  document.getElementById('modal-body').innerHTML = `
    ${r.image ? `<img class="modal-hero" src="${r.image}" alt="${r.name}">` : ''}

    ${r.macros ? `
    <h3 class="section-head">Нутритивни вредности по порција</h3>
    <div class="macro-table">
      <div class="macro-head-row">
        <div class="macro-cell">Калории</div>
        <div class="macro-cell">Јаглехидрати</div>
        <div class="macro-cell">Влакна</div>
        <div class="macro-cell">Масти</div>
        <div class="macro-cell">Од кои заситени</div>
        <div class="macro-cell">Протеини</div>
      </div>
      <div class="macro-val-row">
        <div class="macro-cell">${r.macros.kcal} kcal</div>
        <div class="macro-cell">${r.macros.carbs} g</div>
        <div class="macro-cell">${r.macros.fiber} g</div>
        <div class="macro-cell">${r.macros.fat} g</div>
        <div class="macro-cell">${r.macros.saturated} g</div>
        <div class="macro-cell">${r.macros.protein} g</div>
      </div>
    </div>` : ''}

    <h3 class="section-head">Состојки</h3>
    <ul class="ingredients">
      ${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}
    </ul>

    <h3 class="section-head">Подготовка</h3>
    <ol class="instructions">
      ${r.instructions.map((step, i) => `
        <li>
          <span class="step-num" aria-hidden="true">${i + 1}</span>
          <span>${step}</span>
        </li>`).join('')}
    </ol>
  `;

  const overlay = document.getElementById('overlay');
  const modal   = document.getElementById('modal');
  overlay.classList.add('open');
  modal.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-close').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ================================================================
// EVENT LISTENERS
// ================================================================
document.getElementById('modal-close').addEventListener('click', closeModal);

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
    });
    renderGrid();
  });
});

// ================================================================
// INIT
// ================================================================
renderGrid();
</script>
</body>
</html>
